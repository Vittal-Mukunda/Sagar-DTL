name: Deploy IEM site to GitHub Pages

# Rebuilds and redeploys every time content or code is pushed to main.
# Adding PDFs / folders / CSVs and pushing is all that's needed — the manifest
# is regenerated automatically by the build step.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (generates manifest + copies data + bundles site)
        # BASE_PATH makes asset URLs work under https://<user>.github.io/<repo>/
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add .nojekyll
        # Prevents GitHub Pages' Jekyll from ignoring files that start with "_".
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
